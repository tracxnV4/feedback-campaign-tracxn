<!DOCTYPE html>
<html>
<head>
  <title>Unsubscribe Confirmation</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f6f8;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:white;
      padding:40px;
      border-radius:10px;
      text-align:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      width:350px;
    }

    h2{
      margin-bottom:20px;
    }

    button{
      padding:10px 20px;
      margin:10px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-size:14px;
    }

    .confirm{
      background:#e74c3c;
      color:white;
    }

    .cancel{
      background:#bdc3c7;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Unsubscribe</h2>
  <p>Are you sure you want to unsubscribe from our emails?</p>

  <button class="confirm" onclick="unsubscribe()">Yes, Unsubscribe</button>
  <button class="cancel" onclick="goBack()">Cancel</button>
</div>

<script>


async function unsubscribe(){

  const email = new URLSearchParams(window.location.search).get("email");
  const campaign = new URLSearchParams(window.location.search).get("campaign");
  const category = new URLSearchParams(window.location.search).get("category");

  window.location.href = "success.html?email="+ encodeURIComponent(email) + "&campaign=" + campaign + "&category=" + category;

}

function goBack(){
  window.history.back();
}

</script>

</body>
</html>
