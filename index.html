<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unsubscribe Confirmation</title>

<style>

*{
  box-sizing:border-box;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  background:#eef1f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.container{
  text-align:center;
}

.logo{
  width:560px;
  max-width:92%;
  margin:0 auto 10px auto;
  text-align:center;
}

.logo{
  width:560px;
  max-width:92%;
  margin:0 0 5px -10px;
}
.box{

  background:white;
  padding:45px 40px;
  border-radius:12px;
  box-shadow:0 12px 30px rgba(0,0,0,0.08);
  width:560px;
  max-width:92%;

}

h2{

  margin-bottom:15px;
  font-size:22px;
  color:#2d3436;

}

p{

  color:#636e72;
  font-size:14px;
  line-height:1.6;
  margin-bottom:30px;

}

.buttons{

  display:flex;
  justify-content:center;
  gap:12px;

}

button{

  padding:12px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  transition:all .2s;

}

.confirm{

  background:#0d6efd;
  color:white;

}

.confirm:hover{

  background:#0a58ca;

}

.cancel{

  background:#e9ecef;
  color:#495057;

}

.cancel:hover{

  background:#dee2e6;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="tracxn_logo.png" alt="Tracxn Logo">
</div>

<div class="box">

<h2>Unsubscribe from Emails?</h2>

<p>
Are you sure you would like to unsubscribe from our mailing list?  
Once you confirm, you will no longer receive email communications from us.
</p>

<div class="buttons">

<button class="confirm" onclick="unsubscribe()">
Yes, Unsubscribe
</button>

<button class="cancel" onclick="goBack()">
Cancel
</button>

</div>

</div>

</div>

<script>

function unsubscribe(){

const params = new URLSearchParams(window.location.search);

const email = params.get("email");
const campaign = params.get("campaign");
const category = params.get("category");

window.location.href =
"success.html?email=" + encodeURIComponent(email) +
"&campaign=" + encodeURIComponent(campaign) +
"&category=" + encodeURIComponent(category);

}

function goBack(){

if(document.referrer){
  window.location.href=document.referrer;
}else{
  window.location.href="https://tracxn.com";
}

}

</script>

</body>
</html>
