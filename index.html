<!DOCTYPE html>
<html>
<head>
<title>Unsubscribe</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:100px">

<h2>Unsubscribe Confirmation</h2>

<p>Do you want to unsubscribe?</p>

<button onclick="unsubscribe()">Yes, Unsubscribe</button>

<script>

async function unsubscribe(){

const email = new URLSearchParams(window.location.search).get("email");

const url = "https://script.google.com/macros/s/AKfycbx9rc15-ssa34cRS3JMM_CT43b596ZnDmXdvITbcaTG3eaGxidJmmD39sTI9jGQ-bJBRA/exec?email=" + encodeURIComponent(email);

try {

  await fetch(url);

  window.location.href = "success.html";

} catch(err) {

  alert("Something went wrong. Please try again.");

}

}

</script>

</body>
</html>
