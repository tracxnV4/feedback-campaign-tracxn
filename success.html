<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unsubscribed | Tracxn</title>

<style>
:root {
  --brand-color:#0d6efd;
  --brand-dark:#0a58ca;
  --text-primary:#212529;
  --text-secondary:#6c757d;
  --border-color:#dee2e6;
  --success-color:#198754;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  background:#fff;
  color:var(--text-primary);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:24px;
}
.wrapper{width:100%;max-width:500px;}
.brand-header{
  margin-bottom:24px;
  padding-bottom:24px;
  border-bottom:1px solid var(--border-color);
}
.logo{
  font-size:24px;
  font-weight:800;
  color:var(--brand-dark);
  text-transform:uppercase;
}
.content{margin-bottom:40px;}
.status-header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}
.icon-check{
  color:var(--success-color);
  width:28px;
  height:28px;
}
h1{font-size:22px;font-weight:700;}
p{font-size:16px;color:var(--text-secondary);line-height:1.6;}
.footer{
  margin-top:48px;
  padding-top:24px;
  border-top:1px solid var(--border-color);
}
.footer-links{
  display:flex;
  gap:24px;
  margin-bottom:16px;
}
.footer-links a{
  font-size:13px;
  font-weight:600;
  color:var(--text-secondary);
  text-decoration:none;
}
.footer-links a:hover{color:var(--brand-color);}
.copyright{font-size:12px;color:#adb5bd;}
</style>
</head>

<body>
<div class="wrapper">
  <div class="brand-header">
    <span class="logo">Tracxn</span>
  </div>

  <div class="content">
    <div class="status-header">
      <svg class="icon-check" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
      </svg>
      <h1>Unsubscribed</h1>
    </div>
    
    <p id="unsubscribeText"></p>
  </div>
 

  <div class="footer">
    <div class="footer-links">
      <a href="https://tracxn.com" target="_blank">Platform</a>
      <a href="https://tracxn.com/demo" target="_blank">Request Demo</a>
      <a href="https://www.linkedin.com/company/tracxn" target="_blank">LinkedIn</a>
    </div>
    <div class="copyright">
      © 2026 Tracxn Technologies. All rights reserved.
    </div>
  </div>
</div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbx9rc15-ssa34cRS3JMM_CT43b596ZnDmXdvITbcaTG3eaGxidJmmD39sTI9jGQ-bJBRA/exec";

/* GET URL VALUES */
const params = new URLSearchParams(window.location.search);
const email = params.get("email") || "";
const campaign = params.get("campaign") || "our updates";
const category = params.get("category") || "";

/* SHOW TEXT */
document.getElementById("unsubscribeText").innerHTML =
  `We've removed you from our <b>${campaign}</b> emails.<br>
   You won't receive further updates from your Account Manager.`;
 
	/* SEND DATA */
fetch(WEBAPP_URL, {
  method: 'POST',
  mode: 'no-cors',
  headers: {'Content-Type': 'application/json'},
  body: JSON.stringify({
    email,
    campaign,
    category
  })
});
	

</script>

</body>
</html>
